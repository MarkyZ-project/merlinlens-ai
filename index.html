<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="MerlinLens AI - Scatta una foto, seleziona l'oggetto e scopri cos'è" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>MerlinLens AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js"></script>
</head>
<body>
  <div id="app">

    <!-- ========== LOADING SCREEN ========== -->
    <div class="screen" id="screen-loading">
      <div class="loading-content">
        <div class="loading-ring"><div class="rs"></div><div class="rs"></div><div class="rs"></div></div>
        <h2 class="gradient-text">MerlinLens AI</h2>
        <p id="loading-text">Caricamento modello IA...</p>
        <div class="bar-track"><div class="bar-fill" id="loading-bar"></div></div>
      </div>
    </div>

    <!-- ========== CAMERA SCREEN ========== -->
    <div class="screen hidden" id="screen-camera">
      <video id="webcam" autoplay playsinline muted></video>
      <!-- Top bar -->
      <header class="top-bar">
        <div class="logo">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="url(#g1)" stroke-width="2"><defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#818cf8"/><stop offset="100%" style="stop-color:#c084fc"/></linearGradient></defs><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
          <span>MerlinLens</span>
        </div>
        <div class="top-actions">
          <button class="btn-icon" id="btn-history" aria-label="Cronologia">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </button>
          <button class="btn-icon" id="btn-switch" aria-label="Cambia fotocamera">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </button>
        </div>
      </header>
      <!-- Shutter -->
      <div class="shutter-area">
        <button class="shutter-btn" id="btn-shutter" aria-label="Scatta foto">
          <div class="shutter-inner"></div>
        </button>
      </div>
    </div>

    <!-- ========== CROP SCREEN ========== -->
    <div class="screen hidden" id="screen-crop">
      <header class="top-bar">
        <button class="btn-icon" id="btn-back-crop" aria-label="Indietro">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>
        <span class="top-title">Seleziona l'oggetto</span>
        <div style="width:44px"></div>
      </header>
      <div class="crop-container">
        <canvas id="crop-canvas"></canvas>
        <div class="crop-hint" id="crop-hint">Disegna un rettangolo sull'oggetto</div>
      </div>
      <div class="bottom-actions">
        <button class="btn-primary" id="btn-scan" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Scansiona
        </button>
      </div>
    </div>

    <!-- ========== RESULTS SCREEN ========== -->
    <div class="screen hidden" id="screen-results">
      <header class="top-bar">
        <button class="btn-icon" id="btn-back-results" aria-label="Indietro">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>
        <span class="top-title">Risultato</span>
        <button class="btn-icon" id="btn-new-scan" aria-label="Nuova scansione">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
      </header>
      <div class="results-body">
        <div class="result-photo-wrap">
          <canvas id="result-thumb"></canvas>
        </div>
        <div class="result-card">
          <span class="result-emoji" id="res-emoji">🔍</span>
          <h2 id="res-name">--</h2>
          <p class="result-conf" id="res-conf">Sicurezza: 0%</p>
        </div>
        <div class="result-predictions" id="res-preds"></div>
        <h3 class="section-title">Cerca online</h3>
        <div class="link-grid" id="link-grid"></div>
      </div>
    </div>

    <!-- ========== HISTORY PANEL ========== -->
    <div class="history-overlay hidden" id="history-overlay">
      <div class="history-panel">
        <div class="history-header">
          <h3>Cronologia</h3>
          <button class="btn-icon" id="btn-close-history" aria-label="Chiudi">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="history-list" id="history-list">
          <p class="history-empty">Nessuna scansione ancora</p>
        </div>
        <button class="btn-danger" id="btn-clear-history">Cancella cronologia</button>
      </div>
    </div>

    <!-- ========== ERROR OVERLAY ========== -->
    <div class="screen hidden" id="screen-error">
      <div class="error-content">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <h2>Fotocamera non disponibile</h2>
        <p id="error-text">Consenti l'accesso alla fotocamera.</p>
        <button class="btn-primary" id="btn-retry">Riprova</button>
      </div>
    </div>

  </div>
  <script src="./app.js"></script>
</body>
</html>
