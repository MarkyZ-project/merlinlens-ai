<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MerlinLens AI</title>
    <link rel="stylesheet" href="./style.css">
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <div class="camera-container">
        <video id="webcam" autoplay playsinline muted></video>
        <div class="viewfinder">
          <div class="corner top-left"></div>
          <div class="corner top-right"></div>
          <div class="corner bottom-left"></div>
          <div class="corner bottom-right"></div>
        </div>
      </div>
      
      <div class="ui-layer">
        <header>
          <h1>MerlinLens</h1>
        </header>
        
        <div class="controls">
          <button id="switch-camera-btn" class="icon-btn" aria-label="Switch Camera">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle><polyline points="18 10 18 13 21 13"></polyline></svg>
          </button>
        </div>

        <div class="result-panel">
          <div class="status-indicator" id="status-indicator">
            <div class="spinner"></div>
            <span>Caricamento IA in corso...</span>
          </div>
          <div id="prediction-container" class="hidden">
            <h2 id="prediction-text">--</h2>
            <div class="confidence-bar-container">
              <div id="confidence-bar" class="confidence-bar" style="width: 0%"></div>
            </div>
            <span id="confidence-text">0%</span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
